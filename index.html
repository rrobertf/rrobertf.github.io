<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roberto Feliciano — Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d1a;
      --bg-card: #13132a;
      --accent: #7c6fcd;
      --accent-light: #a78bfa;
      --border: #2a2a4a;
      --text-muted: #94a3b8;
    }
    * { scroll-behavior: smooth; }
    body {
      background-color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: #fff;
    }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    #navbar.scrolled {
      background: rgba(13,13,26,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 py-4 px-6 md:px-16 flex items-center justify-between" aria-label="Main navigation">
    <a href="#hero" class="text-xl font-bold" style="font-family:'Playfair Display',serif; color:var(--accent-light);">RF</a>
    <div class="hidden md:flex gap-8 text-sm font-medium" style="color:var(--text-muted);">
      <a href="#sobre-mi" class="hover:text-white transition-colors">Sobre mí</a>
      <a href="#proyectos" class="hover:text-white transition-colors">Proyectos</a>
      <a href="#habilidades" class="hover:text-white transition-colors">Habilidades</a>
      <a href="#contacto" class="hover:text-white transition-colors">Contacto</a>
    </div>
  </nav>
  <!-- secciones aquí -->
  <script>
    const navbar = document.getElementById('navbar');
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        window.requestAnimationFrame(() => {
          navbar.classList.toggle('scrolled', window.scrollY > 20);
          ticking = false;
        });
        ticking = true;
      }
    });
  </script>
</body>
</html>
